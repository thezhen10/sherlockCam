<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>sherlockCam target scan</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0b0d;
        color: #eee;
        font-family: system-ui, sans-serif;
      }

      #app {
        position: relative;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /*
       * Top 2/3 of the screen. flex: 1 (rather than a fixed height) so it
       * automatically shrinks as #dashboard expands - see #dashboard.expanded
       * below. min-height: 0 lets flexbox actually shrink it instead of
       * overflowing.
       */
      #video-container {
        position: relative;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #000;
      }

      /*
       * Visual guide showing the player where to aim - kept in sync with the
       * scanner's actual region-of-interest crop dynamically from JS (see
       * syncRegionOfInterest() in prototype.js), not hardcoded here.
       */
      #roi-guide {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 3px solid rgba(255, 255, 255, 0.85);
        border-radius: 12px;
        box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.45);
        pointer-events: none;
      }

      /* Centered in the camera area per spec, rather than a bottom control bar. */
      #start-button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        padding: 16px 28px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 999px;
        border: none;
        background: #2563eb;
        color: #fff;
      }

      #start-button.hidden {
        display: none;
      }

      #state-label {
        position: absolute;
        top: env(safe-area-inset-top, 0);
        left: 0;
        right: 0;
        z-index: 1;
        padding: 12px 16px;
        font-size: 13px;
        text-align: center;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      }

      /*
       * Bottom dashboard - a chat-style message log, collapsed to ~1/3 of the
       * screen by default and expandable to near-full-screen. All content
       * inside (bubbles, handle) is created by prototype.js - this file only
       * provides the containers and the collapsed/expanded height states.
       */
      #dashboard {
        position: relative;
        flex-shrink: 0;
        height: 34dvh;
        display: flex;
        flex-direction: column;
        background: #111827;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        transition: height 280ms ease;
        overflow: hidden;
      }

      #dashboard.expanded {
        height: 82dvh;
      }

      #dashboard-handle {
        flex-shrink: 0;
        width: 40px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.25);
        margin: 10px auto 6px;
        cursor: pointer;
      }

      #message-log {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 4px 16px calc(16px + env(safe-area-inset-bottom, 0));
      }

      .bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.4;
        align-self: flex-start;
      }

      .bubble.match {
        background: rgba(22, 163, 74, 0.2);
        border: 1px solid #16a34a;
      }

      .bubble.completion {
        align-self: center;
        background: rgba(37, 99, 235, 0.2);
        border: 1px solid #2563eb;
        font-weight: 600;
      }

      #callback-modal {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 3;
      }

      #callback-modal.visible {
        display: flex;
      }

      #callback-card {
        background: #111827;
        border-radius: 16px;
        padding: 24px;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }

      #callback-card h2 {
        margin-top: 0;
      }

      #callback-card p {
        text-align: left;
        background: #000;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
      }

      #callback-card button {
        margin-top: 12px;
        width: 100%;
        padding: 14px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #2563eb;
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="video-container">
        <video id="camera" autoplay playsinline muted></video>
        <div id="roi-guide"></div>
        <span id="state-label">idle</span>
        <button id="start-button">Start scanning</button>
      </div>

      <div id="dashboard">
        <div id="dashboard-handle"></div>
        <div id="message-log"></div>
      </div>

      <div id="callback-modal"></div>
    </div>

    <script type="module" src="./prototype.js"></script>
  </body>
</html>
